  </defs>
  <text x="0" y="54" font-family="'Orbitron', 'Rajdhani', 'Segoe UI', sans-serif" font-size="46" font-weight="700" letter-spacing="2" fill="url(#titleGrad)" filter="url(#glow)">BalancingAct</text>
  <text x="2" y="68" font-family="'Rajdhani', 'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="4.5" fill="#6B5B95">WAYPOINT-GUIDED RL</text>
